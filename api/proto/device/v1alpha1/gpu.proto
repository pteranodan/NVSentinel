syntax = "proto3";

package nvidia.nvsentinel.v1alpha1;

option go_package = "github.com/nvidia/nvsentinel/internal/generated/device/v1alpha1;v1alpha1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ==========================================
// Resource Definitions
// ==========================================

// TODO: add docs
message TypeMeta {
  string kind = 1;
  string api_version = 2;
}

// ObjectMeta is a subset of k8s.io/apimachinery/pkg/apis/meta/v1.ObjectMeta.
message ObjectMeta {
  // name is the unique logical identifier of the resource. Must be unique within a namespace.
  optional string name = 1;

  // resource_version represents the internal version of this object.
  //
  // Value must be treated as opaque by clients and passed unmodified back to the server.
	// Populated by the system.
	// Read-only.
	// More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
  optional string resource_version = 2;

  // namespace defines the space within which each name must be unique. An empty namespace is
  // equivalent to the "default" namespace, but "default" is the canonical reprsentation.
  // Not all objects are required to be scoped to a namespace - the value of this field for
  // those objects will be empty.
  optional string namespace = 3;

  // uid is the unique in time and space value for this object. It is generated by the server
  // on successful creation of a resource and is not allowed to change on PUT operations.
  //
	// Populated by the system.
	// Read-only.
  optional string uid = 4;

  // generation is a sequence number representing a specific generation of the desired state.
  //
	// Populated by the system.
	// Read-only.
  optional int64 generation = 5;

  // creation_timestamp is a timestamp representing the server time when this object was
  // created. It is not guaranteed to be set in happens-before order across separate operations.
	// Clients may not set this value. It is represented in RFC3339 form and is in UTC.
	//
	// Populated by the system.
	// Read-only.
  optional google.protobuf.Timestamp creation_timestamp = 6;

	// labels is a map of string keys and values that can be used to organize and categorize
	// (scope and select) objects. May match selectors of replication controllers
	// and services.
  map<string, string> labels = 7;

  // annotations is an unstructured key value map stored with a resource that may be set by 
  // external tools to store and retrieve arbitrary metadata. They are not queryable.
  map<string, string> annotations = 8;
}

// ListMeta is a subset of k8s.io/apimachinery/pkg/apis/meta/v1.ListMeta.
message ListMeta {
  // resource_version identifies the version of the list snapshot.
  // Clients can use this version to establish a watch from a consistent point in time.
  //
  // Value must be treated as opaque by clients and passed unmodified back to the server.
  // Populated by the system.
  // Read-only.
  // More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
  optional string resource_version = 1;
}

// GetOptions is the standard query options to the standard gRPC get call.
message GetOptions {
  // resource_version sets a constraint on what resource versions a request may be served from.
  optional string resource_version = 1;
}

// ListOptions is the query options to a standard gRPC list call. It is a subset of k8s.io/apimachinery/pkg/apis/meta/v1.ListOptions.
message ListOptions {
  // TODO: add comments
  optional string label_selector = 1;
  optional bool watch = 2;
  optional bool allow_watch_bookmarks = 3;
  optional bool send_initial_events = 4;

  // resource_version sets a constraint on what resource versions a request may be served from.
  optional string resource_version = 5;

  // resource_version_match determines how resource_version is applied to list calls.
  // It is highly recommended that resource_version_match be set for list calls where
  // resource_version is set.
  optional string resource_version_match = 6;

  // timeout_seconds for list and watch calls.
  // This limits the duration of the call, regardless of any activity or inactivity.
  optional int64 timeout_seconds = 7;
}

// CreateOptions may be provided when creating an API object.
// This message is currently a placeholder; all fields are ignored in v1alpha1.
message CreateOptions { }

// UpdateOptions may be provided when updating an API object.
// This message is currently a placeholder; all fields are ignored in v1alpha1.
message UpdateOptions { }

// DeleteOptions may be provided when deleting an API object.
message DeleteOptions { 
  // preconditions must be fulfilled before a deletion is carried out. If not possible,
  // a 409 conflict status will be returned.
  optional Preconditions preconditions = 1;
}

// Preconditions must be fulfilled before an operation (update or delete) is carried out.
message Preconditions {
  // uid specifies the target uid
  optional string uid = 1;

  // resource_version specifies the target resource_version
  optional string resource_version = 2;
}

// PatchOptions may be provided when updating an API object.
// This message is currently a placeholder; all fields are ignored in v1alpha1.
message PatchOptions { }

// Gpu represents a single GPU resource.
//
// Its structure follows the Kubernetes Resource Model pattern (Spec/Status).
//
// The resource name (metadata.name) is typically the lowercased GPU UUID, 
// but may take other forms.
//
// Example: "gpu-a1b2c3d4-e5f6-a7b8-c9d0-e1f2a3b4c5d6"
message Gpu {
  TypeMeta type_meta = 1; 

  optional ObjectMeta object_meta = 2;

  // spec defines the identity and desired attributes of the GPU resource.
  optional GpuSpec spec = 3;

  // status contains the most recently observed state of the GPU resource.
  // This data may lag slightly behind the actual on-device state.
  optional GpuStatus status = 4;
}

// GpuList is a collection of GPU resources.
message GpuList {
  TypeMeta type_meta = 1;

  optional ListMeta list_meta = 2;

  // items is the list of GPU resources.
  repeated Gpu items = 3;
}

// GpuSpec describes the identity and desired attributes of the GPU.
message GpuSpec {
  // uuid is the physical hardware UUID of this GPU.
  //
  // Format: 'GPU-<hex-string>' (e.g., 'GPU-a1b2c3d4-e5f6-a7b8-c9d0-e1f2a3b4c5d6').
  string uuid = 1;
}

// GpuStatus defines the observed state of the GPU.
message GpuStatus {
  // conditions represent the observations of this GPU's current state.
  repeated Condition conditions = 1;

  // recommended_action is a suggestion for resolving the current negative state.
  optional string recommended_action = 2;
}

// Condition contains details for one aspect of the current state of a GPU.
message Condition {
  // type describes the category of the condition.
  //
  // Format: CamelCase or a domain-prefixed string (e.g., foo.example.com/CamelCase)
  string type = 1;

  // status of the condition.
  //
  // Valid values: "True", "False", "Unknown".
  string status = 2;

  // observedGeneration represents the .metadata.generation that the condition was set based upon.
  optional int64 observed_generation = 3;

  // last_transition_time is the timestamp corresponding to the last time the condition transitioned from one status to another. 
  google.protobuf.Timestamp last_transition_time = 4;

  // reason is a machine-readable, UpperCamelCase text string indicating the reason for the condition's last transition.
  string reason = 5;

  // message is a human-readable message indicating details about the transition.
  string message = 6;
}

// ==========================================
// Service Definition
// ==========================================

// GpuService provides an API for observing GPU resources.
service GpuService {

  // GetGpu retrieves a single GPU resource by its unique name.
  rpc GetGpu(GetGpuRequest) returns (GetGpuResponse);

  // ListGpus retrieves a list of GPU resources.
  rpc ListGpus(ListGpusRequest) returns (ListGpusResponse);

  // WatchGpus streams lifecycle events for GPU resources.
  rpc WatchGpus(WatchGpusRequest) returns (stream WatchGpusResponse);

  // CreateGpu creates a single GPU resource.
  rpc CreateGpu(CreateGpuRequest) returns (Gpu);

  // UpdateGpu updates a single GPU resource.
  rpc UpdateGpu(UpdateGpuRequest) returns (Gpu);

  // UpdateGpuStatus updates only the status subresource of a GPU.
  rpc UpdateGpuStatus(UpdateGpuStatusRequest) returns (Gpu);

  // DeleteGpu deletes a single GPU resource.
  rpc DeleteGpu(DeleteGpuRequest) returns (google.protobuf.Empty);

  // PatchGpu patches a single GPU resource.
  rpc PatchGpu(PatchGpuRequest) returns (Gpu);
}

// ==========================================
// Request / Response Messages
// ==========================================

// GetGpuRequest specifies the GPU to retrieve.
message GetGpuRequest {
  // The unique resource name of the GPU to retrieve.
  string name = 1;

  // namespace sets a constraint on what namespaces a request may be served from.
  // An empty namespace is treated as a request for all namespaces.
  optional string namespace = 2;

  // opts contains the standard query and scoping options for the request.
  GetOptions opts = 3;
}

// GetGpuResponse contains the requested GPU resource.
message GetGpuResponse {
  // gpu is the requested GPU resource.
  Gpu gpu = 1;
}

// ListGpusRequest specifies the criteria for listing GPU resources.
message ListGpusRequest {
  // namespace sets a constraint on what namespaces a request may be served from.
  // An empty namespace is treated as a request for all namespaces.
  optional string namespace = 1;

  // opts contains the standard query and scoping options for the list.
  ListOptions opts = 2;
}

// ListGpusResponse contains the list of GPU resources.
message ListGpusResponse {
  // gpu_list contains the list of retrieved GPU resources.
  GpuList gpu_list = 1;
}

// WatchGpusRequest specifies the parameters for the watch stream.
message WatchGpusRequest {
  // namespace sets a constraint on what namespaces a request may be served from.
  // An empty namespace is treated as a request for all namespaces.
  optional string namespace = 1;

  // opts contains the standard query and scoping options for the watch.
  ListOptions opts = 2;
}

// WatchGpusResponse describes a change event for a GPU resource.
message WatchGpusResponse {
  // type indicates the nature of the change.
  //
  // Valid values:
  //  - "ADDED": The GPU resource was created or first observed.
  //  - "MODIFIED": The GPU resource was updated.
  //  - "DELETED": The GPU resource was removed.
  //  - "ERROR": An error occurred during the watch stream.
  string type = 1;

  // object is the GPU resource.
  //
  // For "DELETED", this contains the last known state.
  // For "ERROR", this may be empty or contain partial data.
  Gpu object = 2;
}

// CreateGpuRequest specifies the GPU to create.
message CreateGpuRequest {
  // gpu is the GPU resource to create.
  Gpu gpu = 1;

  // opts contains the options for the create.
  CreateOptions opts = 2;
}

// UpdateGpuRequest specifies the GPU to update.
message UpdateGpuRequest {
  // gpu is the GPU resource to update.
  Gpu gpu = 1;

  // opts contains the options for the update.
  UpdateOptions opts = 2;
}

// UpdateGpuStatusRequest specifies the GPU whose status subresource to update.
message UpdateGpuStatusRequest {
  // gpu is the GPU resource with the updated status.
  Gpu gpu = 1;

  // opts contains the options for the status update.
  UpdateOptions opts = 2;
}

// DeleteGpuRequest specifies the GPU to delete.
message DeleteGpuRequest {
  // The unique resource name of the GPU to delete.
  string name = 1;

  // namespace sets a constraint on what namespaces a request may be executed in.
  // An empty namespace is treated as a request for all namespaces.
  optional string namespace = 2;

  // opts contains the options for the delete. 
  DeleteOptions opts = 3;
}

// PatchGpuRequest specifies the GPU to patch.
message PatchGpuRequest {
  // The unique resource name of the GPU to patch.
  string name = 1;

  // namespace sets a constraint on what namespaces a request may be executed in.
  // An empty namespace is treated as a request for all namespaces.
  optional string namespace = 2;

  // patch_type is the type of patch being provided. One of: [json, merge]
  // See 'k8s.io/apimachinery/pkg/types.PatchType' for more details.
  string patch_type = 3;

  // data is the patch to be applied to the resource.
  bytes data = 4;

  // opts contains the options for the patch.
  PatchOptions opts = 5;

  // If specified, patch will operate on the subresource (e.g., status) of the GPU.
  repeated string subresources = 6;
}
