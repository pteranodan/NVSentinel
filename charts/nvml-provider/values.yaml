# Default values for nvml-provider

global: {}

# String to override the release name.
nameOverride: ""
# String to override the fully qualified application name.
fullnameOverride: "nvml-provider"

image:
  registry: ghcr.io
  repository: nvidia/nvml-provider
  pullPolicy: IfNotPresent
  tag: ""

# Reference to one or more secrets to be used for pulling images from private registries.
# Example for NVIDIA NGC registry (nvcr.io):
#
# First, create a Kubernetes secret with your NGC API key:
#   kubectl create secret docker-registry ngc-secret \
#     --docker-server=nvcr.io \
#     --docker-username='$oauthtoken' \
#     --docker-password='nvapi-YOUR-API-KEY' \
#     --namespace=<your-namespace>
#
# Then reference the secret here:
# imagePullSecrets:
#   - name: ngc-secret
imagePullSecrets: []

# Additional annotations to add to the pod.
podAnnotations: {}

# Additional labels to add to the pod.
podLabels: {}

# Pod-level security context.
podSecurityContext:
  fsGroup: 5000

# Container-level security context.
securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 5000

# Settings for the service account used by the pod.
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use. If not set and create is true, a name is generated.
  name: ""

# Resource requests and limits for the container.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Node selector, tolerations, and affinity for pod scheduling.
nodeSelector: {}
tolerations:
  - operator: "Exists"

# By default, this chart only schedules pods on nodes with NVIDIA GPUs.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: nvidia.com/gpu.product
          operator: Exists

# TODO: remove path
livenessProbe:
  httpGet:
    path: /healthz
    port: 8082
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
readinessProbe:
  httpGet:
    path: /readyz
    port: 8082
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3

# Extra volumes to mount into the pod.
extraVolumes: []

# Extra volume mounts for the container.
extraVolumeMounts: []

# Extra arguments to pass to the binary.
extraArgs: []
