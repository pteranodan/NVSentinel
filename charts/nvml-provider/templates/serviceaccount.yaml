{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nvml-provider.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvml-provider.labels" . | nindent 4 }}
    {{- with (default .Values.global dict).labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- $localSecrets := default list .Values.imagePullSecrets -}}
{{- $globalRootSecrets := default list .Values.global.imagePullSecrets -}}
{{- $globalImageSecrets := default list (default dict .Values.global.image).imagePullSecrets -}}
{{- $pullSecrets := concat $localSecrets $globalRootSecrets $globalImageSecrets | uniq -}}
{{- if $pullSecrets }}
imagePullSecrets:
  {{- range $pullSecrets }}
  - name: {{ .name }}
  {{- end }}
{{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}

